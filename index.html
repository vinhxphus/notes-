<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes của Phú</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #faf9f6;
    --card: #ffffff;
    --ink: #1f1f1f;
    --muted: #6b6b6b;
    --accent: #2f6f4f;
    --accent-soft: #e6f0ea;
    --border: #e5e2db;
  }
  :root[data-theme="dark"] {
    --bg: #17181a;
    --card: #232427;
    --ink: #eaeaea;
    --muted: #9a9a9a;
    --accent: #6cc39a;
    --accent-soft: #1e3229;
    --border: #34363a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }
  @media (max-width: 480px) {
    .wrap { padding: 28px 16px 60px; }
    h1 { font-size: 1.35rem; }
    .note { padding: 14px 16px; }
    .header-top {
      flex-direction: column;
      align-items: stretch;
    }
    .header-actions {
      justify-content: flex-start;
    }
    .icon-btn {
      flex: 1 1 auto;
      justify-content: center;
    }
    .note-body { font-size: 0.9rem; }
    .otd-banner { font-size: 0.82rem; }
  }
  header {
    margin-bottom: 24px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 4px;
  }
  .sub {
    color: var(--muted);
    font-size: 0.9rem;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .icon-btn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--ink);
    padding: 9px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
    min-height: 40px;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .otd-banner {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 20px;
    font-size: 0.88rem;
    display: none;
  }
  .otd-banner a { color: var(--accent); text-decoration: none; }
  .otd-banner a:hover { text-decoration: underline; }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 24px 0 32px;
  }
  #search {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    background: var(--card);
    color: var(--ink);
  }
  #search:focus { outline: none; border-color: var(--accent); }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag-btn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s ease;
    min-height: 38px;
    -webkit-tap-highlight-color: transparent;
  }
  .tag-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tag-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .count {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 4px;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 16px;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.88rem;
  }
  .back-link:hover { text-decoration: underline; }
  .note {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .note h2 {
    font-size: 1.05rem;
    margin: 0 0 6px;
  }
  .note h2 a {
    color: var(--ink);
    text-decoration: none;
  }
  .note h2 a:hover { color: var(--accent); }
  .note .date {
    color: var(--muted);
    font-size: 0.78rem;
    margin-bottom: 10px;
  }
  .note-body {
    font-size: 0.94rem;
    margin-bottom: 12px;
  }
  .note-body p { margin: 0 0 10px; }
  .note-body p:last-child { margin-bottom: 0; }
  .note-body ul, .note-body ol { margin: 0 0 10px; padding-left: 22px; }
  .note-body a { color: var(--accent); }
  .note-body code {
    background: var(--accent-soft);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.85em;
  }
  .note-img {
    display: block;
    max-width: 100%;
    border-radius: 8px;
    margin: 4px 0 14px;
    border: 1px solid var(--border);
  }
  .note-audio {
    width: 100%;
    margin: 4px 0 14px;
  }
  .note .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .note .tag-chip {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.75rem;
    padding: 2px 9px;
    border-radius: 999px;
  }
  .empty {
    color: var(--muted);
    text-align: center;
    padding: 40px 0;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <div>
        <h1>📝 Notes của Phú</h1>
        <div class="sub">Lưu chủ đề thú vị, ghi chú thường ngày</div>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="icon-btn" type="button">🌙</button>
        <button id="randomBtn" class="icon-btn" type="button">🎲 Ngẫu nhiên</button>
        <a href="https://vinhphu-notes-app.netlify.app/admin/" class="icon-btn">🔐 Quản trị</a>
      </div>
    </div>
  </header>

  <div id="onThisDayBanner" class="otd-banner"></div>

  <div class="controls" id="controlsWrap">
    <input id="search" type="text" placeholder="Tìm theo tiêu đề, nội dung, tag...">
    <div class="tags" id="tagFilters"></div>
  </div>

  <div class="count" id="count"></div>
  <div id="noteList"></div>
</div>

<script>
/* ============================================================
   Note được đọc từ file content/notes.json (không còn nằm trong file này).
   Thêm/sửa note qua trang /admin, hoặc sửa tay file content/notes.json.
============================================================ */
let notes = [];
let activeTags = new Set();
let searchTerm = "";

marked.setOptions({ breaks: true });

function slugify(str) {
  const noDiacritics = str
    .replace(/đ/g, "d").replace(/Đ/g, "D")
    .normalize("NFD")
    .split("")
    .filter(ch => ch.charCodeAt(0) < 0x0300 || ch.charCodeAt(0) > 0x036f)
    .join("");
  return noDiacritics
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/(^-|-$)/g, "");
}

function noteSlug(note) {
  return slugify(note.title) + "-" + note.date.slice(0, 10);
}

function allTags() {
  const s = new Set();
  notes.forEach(n => n.tags.forEach(t => s.add(t)));
  return [...s].sort();
}

function formatDate(d) {
  const [y, m, day] = d.slice(0, 10).split("-");
  return `${day}/${m}/${y}`;
}

function renderTagFilters() {
  const el = document.getElementById("tagFilters");
  el.innerHTML = "";
  allTags().forEach(tag => {
    const btn = document.createElement("button");
    btn.className = "tag-btn" + (activeTags.has(tag) ? " active" : "");
    btn.textContent = tag;
    btn.onclick = () => {
      activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
      render();
    };
    el.appendChild(btn);
  });
}

function matchesFilter(note) {
  const term = searchTerm.trim().toLowerCase();
  const matchesSearch = !term ||
    note.title.toLowerCase().includes(term) ||
    note.content.toLowerCase().includes(term) ||
    note.tags.some(t => t.toLowerCase().includes(term));
  const matchesTags = activeTags.size === 0 ||
    note.tags.some(t => activeTags.has(t));
  return matchesSearch && matchesTags;
}

function noteCardHtml(note, linkTitle) {
  const titleHtml = linkTitle
    ? `<a href="#n=${encodeURIComponent(noteSlug(note))}">${escapeHtml(note.title)}</a>`
    : escapeHtml(note.title);
  return `
    <h2>${titleHtml}</h2>
    <div class="date">${formatDate(note.date)}</div>
    ${note.image ? `<img class="note-img" src="${escapeHtml(note.image)}" alt="${escapeHtml(note.title)}" onerror="this.style.display='none'">` : ""}
    ${note.audio ? `<audio class="note-audio" controls src="${escapeHtml(note.audio)}"></audio>` : ""}
    <div class="note-body">${marked.parse(note.content || "")}</div>
    <div class="tag-list">
      ${note.tags.map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join("")}
    </div>
  `;
}

function render() {
  renderTagFilters();
  const sorted = [...notes].sort((a, b) => b.date.localeCompare(a.date));
  const filtered = sorted.filter(matchesFilter);

  document.getElementById("count").textContent =
    `${filtered.length} / ${notes.length} note`;

  const list = document.getElementById("noteList");
  list.innerHTML = "";

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">Không tìm thấy note nào phù hợp.</div>`;
    return;
  }

  filtered.forEach(note => {
    const div = document.createElement("div");
    div.className = "note";
    div.innerHTML = noteCardHtml(note, true);
    list.appendChild(div);
  });
}

function showDetail(note) {
  document.getElementById("controlsWrap").style.display = "none";
  document.getElementById("count").style.display = "none";
  document.getElementById("onThisDayBanner").style.display = "none";
  const list = document.getElementById("noteList");
  list.innerHTML = `
    <a href="#" class="back-link">← Quay lại danh sách</a>
    <div class="note">${noteCardHtml(note, false)}</div>
  `;
}

function showList() {
  document.getElementById("controlsWrap").style.display = "";
  document.getElementById("count").style.display = "";
  renderOnThisDay();
  render();
}

function route() {
  const hash = location.hash;
  if (hash.startsWith("#n=")) {
    const slug = decodeURIComponent(hash.slice(3));
    const note = notes.find(n => noteSlug(n) === slug);
    if (note) { showDetail(note); return; }
  }
  showList();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function findOnThisDay() {
  const today = new Date();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  const thisYear = today.getFullYear();
  return notes.find(n => {
    const [y, m, day] = n.date.slice(0, 10).split("-");
    return m === mm && day === dd && Number(y) !== thisYear;
  });
}

function renderOnThisDay() {
  const note = findOnThisDay();
  const el = document.getElementById("onThisDayBanner");
  if (!note) { el.style.display = "none"; return; }
  el.style.display = "block";
  el.innerHTML = `📅 Hôm nay năm xưa (${formatDate(note.date)}): <a href="#n=${encodeURIComponent(noteSlug(note))}"><strong>${escapeHtml(note.title)}</strong></a>`;
}

document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value;
  render();
});

document.getElementById("randomBtn").addEventListener("click", () => {
  if (notes.length === 0) return;
  const note = notes[Math.floor(Math.random() * notes.length)];
  location.hash = "#n=" + encodeURIComponent(noteSlug(note));
});

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("themeToggle").textContent = theme === "dark" ? "☀️" : "🌙";
}

function initTheme() {
  const saved = localStorage.getItem("theme");
  if (saved) { applyTheme(saved); return; }
  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(prefersDark ? "dark" : "light");
}

document.getElementById("themeToggle").addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  applyTheme(next);
  localStorage.setItem("theme", next);
});

initTheme();
window.addEventListener("hashchange", route);

async function loadNotes() {
  try {
    const res = await fetch("content/notes.json", { cache: "no-store" });
    const data = await res.json();
    notes = data.notes || [];
  } catch (e) {
    notes = [];
    document.getElementById("noteList").innerHTML =
      '<div class="empty">Không tải được note. Nếu đang mở file trực tiếp trên máy (không qua link web), hãy mở qua link online thay vì mở file trực tiếp.</div>';
    return;
  }
  route();
}

loadNotes();
</script>
</body>
</html>
