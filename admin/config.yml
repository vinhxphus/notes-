backend:
  name: git-gateway
  repo: vinhxphus/notes-
  branch: main
  identity_url: https://vinhphu-notes-app.netlify.app/.netlify/identity
  gateway_url: https://vinhphu-notes-app.netlify.app/.netlify/git

site_url: https://vinhxphus.github.io/notes-/
display_url: https://vinhxphus.github.io/notes-/

media_folder: "images"
public_folder: "/images"

collections:
  - name: "notes"
    label: "Notes"
    files:
      - file: "content/notes.json"
        label: "Danh sách Note"
        name: "notes"
        fields:
          - label: "Danh sách note"
            name: "notes"
            widget: "list"
            summary: "{{title}} — {{date}}"
            fields:
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Ngày", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - label: "Tag"
                name: "tags"
                widget: "select"
                multiple: true
                default: []
                options:
                  - "hướng dẫn"
                  - "ý tưởng"
                  - "công việc"
                  - "thú vị"
                  - "đọc"
                  - "đời sống"
                  - "sức khoẻ"
                  - "gia đình"
                  - "học tập"
                  - "công nghệ"
              - { label: "Ảnh", name: "image", widget: "image", required: false, default: "" }
              - { label: "Ghi âm", name: "audio", widget: "audiorecorder", required: false, default: "" }
              - label: "Link bài viết hay"
                name: "sourceLink"
                widget: "linkfetcher"
                required: false
                default: ""
                hint: "Dán link bài viết rồi bấm Lấy thông tin để tự điền tiêu đề/mô tả/ảnh."
              - { label: "Nội dung", name: "content", widget: "markdown", buttons: ["bold", "italic", "link", "bulleted-list", "numbered-list"], modes: ["rich_text"] }
