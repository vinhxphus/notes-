<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Notes</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    html, body { overflow-x: hidden; max-width: 100vw; }
    img, audio, video { max-width: 100% !important; }
    #viewSiteBtn {
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 9999;
      background: #2f6f4f;
      color: #fff;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 999px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      white-space: nowrap !important;
    }
    @media (max-width: 600px) {
      #viewSiteBtn {
        top: auto;
        bottom: 14px;
        right: 14px;
      }
    }
  </style>
</head>
<body>
  <a id="viewSiteBtn" href="https://vinhxphus.github.io/notes-/" target="_blank" rel="noopener">👁 Xem trang web</a>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    /* Custom widget: ghi âm trực tiếp trong form, lưu dưới dạng data URL
       (không cần upload file riêng lên GitHub). */
    var AudioRecorderControl = createClass({
      getInitialState: function () {
        return { recording: false, seconds: 0 };
      },
      startRecording: function () {
        var self = this;
        if (!navigator.mediaDevices || !window.MediaRecorder) {
          alert("Trình duyệt này không hỗ trợ ghi âm.");
          return;
        }
        navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
          self.chunks = [];
          self.stream = stream;
          var options = {};
          var preferredTypes = ["audio/mp4", "audio/webm", "audio/ogg", "audio/wav"];
          for (var i = 0; i < preferredTypes.length; i++) {
            if (window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(preferredTypes[i])) {
              options.mimeType = preferredTypes[i];
              break;
            }
          }
          self.recorder = options.mimeType ? new MediaRecorder(stream, options) : new MediaRecorder(stream);
          self.recorder.ondataavailable = function (e) {
            if (e.data.size > 0) self.chunks.push(e.data);
          };
          self.recorder.onstop = function () {
            var actualType = self.recorder.mimeType || "audio/webm";
            var blob = new Blob(self.chunks, { type: actualType });
            var reader = new FileReader();
            reader.onloadend = function () {
              self.props.onChange(reader.result);
            };
            reader.readAsDataURL(blob);
            self.stream.getTracks().forEach(function (t) { t.stop(); });
          };
          self.recorder.start();
          self.setState({ recording: true, seconds: 0 });
          self.timer = setInterval(function () {
            self.setState({ seconds: self.state.seconds + 1 });
          }, 1000);
        }).catch(function () {
          alert("Không truy cập được micro. Kiểm tra quyền micro cho trình duyệt rồi thử lại.");
        });
      },
      stopRecording: function () {
        if (this.recorder) this.recorder.stop();
        clearInterval(this.timer);
        this.setState({ recording: false });
      },
      clear: function () {
        this.props.onChange("");
      },
      render: function () {
        var rawValue = this.props.value;
        var hasValue = typeof rawValue === "string" && rawValue.trim().length > 0;
        var seconds = this.state.seconds;
        var mm = Math.floor(seconds / 60);
        var ss = seconds % 60;
        var label = (mm < 10 ? "0" : "") + mm + ":" + (ss < 10 ? "0" : "") + ss;
        return h(
          "div",
          { style: { padding: "6px 0" } },
          !this.state.recording
            ? h("button", { type: "button", onClick: this.startRecording }, "⏺ Bắt đầu ghi")
            : h("button", { type: "button", onClick: this.stopRecording }, "⏹ Dừng ghi (" + label + ")"),
          hasValue
            ? h(
                "div",
                { style: { marginTop: "10px" } },
                h("audio", { controls: true, src: rawValue, style: { width: "100%" } }),
                h(
                  "button",
                  { type: "button", onClick: this.clear, style: { marginTop: "6px", display: "block" } },
                  "Xoá ghi âm"
                )
              )
            : null
        );
      }
    });

    var AudioRecorderPreview = createClass({
      render: function () {
        var rawValue = this.props.value;
        var hasValue = typeof rawValue === "string" && rawValue.trim().length > 0;
        if (!hasValue) return h("div", {}, "(chưa có ghi âm)");
        return h("audio", { controls: true, src: rawValue, style: { width: "100%" } });
      }
    });

    CMS.registerWidget("audiorecorder", AudioRecorderControl, AudioRecorderPreview);

    /* Custom widget: dán link bài viết, tự lấy tiêu đề/mô tả/ảnh qua Microlink API,
       lưu tất cả vào 1 field dạng JSON string. */
    function parseLinkValue(raw) {
      if (!raw) return null;
      try {
        var parsed = JSON.parse(raw);
        if (parsed && parsed.url) return parsed;
        return null;
      } catch (e) {
        return null;
      }
    }

    var LinkFetcherControl = createClass({
      getInitialState: function () {
        var parsed = parseLinkValue(this.props.value);
        return { loading: false, error: "", inputUrl: parsed ? parsed.url : "" };
      },
      handleInputChange: function (e) {
        this.setState({ inputUrl: e.target.value });
      },
      fetchInfo: function () {
        var self = this;
        var url = (this.state.inputUrl || "").trim();
        if (!url) {
          this.setState({ error: "Dán link vào ô trước đã." });
          return;
        }
        if (!/^https?:\/\//i.test(url)) url = "https://" + url;
        this.setState({ loading: true, error: "" });
        fetch("https://api.microlink.io/?url=" + encodeURIComponent(url))
          .then(function (res) { return res.json(); })
          .then(function (json) {
            if (json.status !== "success") throw new Error("fail");
            var d = json.data || {};
            var result = {
              url: url,
              title: d.title || "",
              description: d.description || "",
              image: (d.image && d.image.url) || (d.logo && d.logo.url) || ""
            };
            self.props.onChange(JSON.stringify(result));
            self.setState({ loading: false, error: "" });
          })
          .catch(function () {
            var result = { url: url, title: "", description: "", image: "" };
            self.props.onChange(JSON.stringify(result));
            self.setState({
              loading: false,
              error: "Không lấy được thông tin bài viết (trang có thể chặn), đã lưu link — anh tự điền tiêu đề nhé."
            });
          });
      },
      clear: function () {
        this.props.onChange("");
        this.setState({ inputUrl: "", error: "" });
      },
      render: function () {
        var parsed = parseLinkValue(this.props.value);
        if (parsed) {
          return h(
            "div",
            { style: { padding: "6px 0" } },
            h(
              "div",
              { style: { border: "1px solid #ddd", borderRadius: "8px", padding: "10px", display: "flex", gap: "10px" } },
              parsed.image
                ? h("img", { src: parsed.image, style: { width: "64px", height: "64px", objectFit: "cover", borderRadius: "6px", flexShrink: "0" } })
                : null,
              h(
                "div",
                {},
                h("div", { style: { fontWeight: "600", marginBottom: "4px" } }, parsed.title || "(chưa có tiêu đề)"),
                parsed.description
                  ? h("div", { style: { fontSize: "12px", color: "#666", marginBottom: "4px" } }, parsed.description)
                  : null,
                h("a", { href: parsed.url, target: "_blank" }, parsed.url)
              )
            ),
            h("button", { type: "button", onClick: this.clear, style: { marginTop: "8px" } }, "Nhập link khác")
          );
        }
        return h(
          "div",
          { style: { padding: "6px 0" } },
          h("input", {
            type: "text",
            placeholder: "Dán link bài viết vào đây",
            value: this.state.inputUrl,
            onChange: this.handleInputChange,
            style: { width: "100%", padding: "8px", marginBottom: "8px", boxSizing: "border-box" }
          }),
          h(
            "button",
            { type: "button", onClick: this.fetchInfo, disabled: this.state.loading },
            this.state.loading ? "Đang lấy thông tin..." : "🔍 Lấy thông tin"
          ),
          this.state.error
            ? h("div", { style: { color: "#c0392b", fontSize: "12px", marginTop: "6px" } }, this.state.error)
            : null
        );
      }
    });

    var LinkFetcherPreview = createClass({
      render: function () {
        var parsed = parseLinkValue(this.props.value);
        if (!parsed) return h("div", {}, "(chưa có link)");
        return h(
          "div",
          {},
          h("div", { style: { fontWeight: "600" } }, parsed.title || parsed.url),
          h("a", { href: parsed.url, target: "_blank" }, parsed.url)
        );
      }
    });

    CMS.registerWidget("linkfetcher", LinkFetcherControl, LinkFetcherPreview);

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
