<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Notes</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    html, body { overflow-x: hidden; max-width: 100vw; }
    * { max-width: 100%; box-sizing: border-box; }
    img, audio, video { max-width: 100% !important; }
    div, span, p, li, a, button, label {
      white-space: normal !important;
      overflow-wrap: break-word !important;
      word-break: break-word !important;
      text-overflow: unset !important;
    }
    #viewSiteBtn {
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 9999;
      background: #2f6f4f;
      color: #fff;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 999px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <a id="viewSiteBtn" href="https://vinhxphus.github.io/notes-/" target="_blank" rel="noopener">👁 Xem trang web</a>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    /* Custom widget: ghi âm trực tiếp trong form, lưu dưới dạng data URL
       (không cần upload file riêng lên GitHub). */
    var AudioRecorderControl = createClass({
      getInitialState: function () {
        return { recording: false, seconds: 0 };
      },
      startRecording: function () {
        var self = this;
        if (!navigator.mediaDevices || !window.MediaRecorder) {
          alert("Trình duyệt này không hỗ trợ ghi âm.");
          return;
        }
        navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
          self.chunks = [];
          self.stream = stream;
          var options = {};
          var preferredTypes = ["audio/mp4", "audio/webm", "audio/ogg", "audio/wav"];
          for (var i = 0; i < preferredTypes.length; i++) {
            if (window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(preferredTypes[i])) {
              options.mimeType = preferredTypes[i];
              break;
            }
          }
          self.recorder = options.mimeType ? new MediaRecorder(stream, options) : new MediaRecorder(stream);
          self.recorder.ondataavailable = function (e) {
            if (e.data.size > 0) self.chunks.push(e.data);
          };
          self.recorder.onstop = function () {
            var actualType = self.recorder.mimeType || "audio/webm";
            var blob = new Blob(self.chunks, { type: actualType });
            var reader = new FileReader();
            reader.onloadend = function () {
              self.props.onChange(reader.result);
            };
            reader.readAsDataURL(blob);
            self.stream.getTracks().forEach(function (t) { t.stop(); });
          };
          self.recorder.start();
          self.setState({ recording: true, seconds: 0 });
          self.timer = setInterval(function () {
            self.setState({ seconds: self.state.seconds + 1 });
          }, 1000);
        }).catch(function () {
          alert("Không truy cập được micro. Kiểm tra quyền micro cho trình duyệt rồi thử lại.");
        });
      },
      stopRecording: function () {
        if (this.recorder) this.recorder.stop();
        clearInterval(this.timer);
        this.setState({ recording: false });
      },
      clear: function () {
        this.props.onChange("");
      },
      render: function () {
        var rawValue = this.props.value;
        var hasValue = typeof rawValue === "string" && rawValue.trim().length > 0;
        var seconds = this.state.seconds;
        var mm = Math.floor(seconds / 60);
        var ss = seconds % 60;
        var label = (mm < 10 ? "0" : "") + mm + ":" + (ss < 10 ? "0" : "") + ss;
        return h(
          "div",
          { style: { padding: "6px 0" } },
          !this.state.recording
            ? h("button", { type: "button", onClick: this.startRecording }, "⏺ Bắt đầu ghi")
            : h("button", { type: "button", onClick: this.stopRecording }, "⏹ Dừng ghi (" + label + ")"),
          hasValue
            ? h(
                "div",
                { style: { marginTop: "10px" } },
                h("audio", { controls: true, src: rawValue, style: { width: "100%" } }),
                h(
                  "button",
                  { type: "button", onClick: this.clear, style: { marginTop: "6px", display: "block" } },
                  "Xoá ghi âm"
                )
              )
            : null
        );
      }
    });

    var AudioRecorderPreview = createClass({
      render: function () {
        var rawValue = this.props.value;
        var hasValue = typeof rawValue === "string" && rawValue.trim().length > 0;
        if (!hasValue) return h("div", {}, "(chưa có ghi âm)");
        return h("audio", { controls: true, src: rawValue, style: { width: "100%" } });
      }
    });

    CMS.registerWidget("audiorecorder", AudioRecorderControl, AudioRecorderPreview);

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
